name: Publish Sandbox Image On Main Push

# The sandbox image is independent of the drukbox application code, so it only
# rebuilds when its own build context (or this workflow) changes.
on:
  push:
    branches:
      - main
    paths:
      - images/local/**
      - .github/workflows/publish-sandbox-image.yml
  workflow_dispatch:

concurrency:
  group: sandbox-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-sandbox-image:
    name: Build And Publish Sandbox Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract sandbox image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/sandbox
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v7
        with:
          context: ./images/local
          file: ./images/local/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
